name: Android CI (Build Automático)

# Define quando o build será executado (neste caso, em pushes ou pull requests na main)
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Baixa o código do seu repositório para a máquina virtual
    - name: Checkout do código
      uses: actions/checkout@v4

    # 2. Configura a versão correta do Java (JDK 17 ou 21 é o ideal para o Gradle mais recente)
    - name: Configurar o JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # 3. Configura e otimiza o cache do Gradle (faz os próximos builds ficarem bem mais rápidos)
    - name: Configurar o Gradle
      uses: gradle/actions/setup-gradle@v4

    # 4. Dá permissão para o script do Gradle rodar no Linux
    - name: Permitir execução do Gradle Wrapper
      run: chmod +x gradlew

    # 5. Executa o comando para buildar o aplicativo em modo Debug
    - name: Rodar o Build (Gerar APK)
      run: ./gradlew assembleDebug

    # 6. Salva o APK gerado para que você possa baixá-lo pelo GitHub
    - name: Salvar APK como Artefato
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
